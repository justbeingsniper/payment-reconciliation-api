# Render Blueprint — one-click deploy of the API + a managed Postgres.
# In the Render dashboard: New > Blueprint > point at this repo.
services:
  - type: web
    name: setu-reconciliation
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: setu-db
          property: connectionString
      - key: STUCK_THRESHOLD_HOURS
        value: "24"
      # Self-seed the bundled sample data on first boot (guarded: only when the
      # events table is empty). Lets the free-tier demo populate itself over the
      # internal DB connection without shell access. Set to "false" to disable.
      - key: SEED_ON_STARTUP
        value: "true"

databases:
  - name: setu-db
    plan: free
    databaseName: setu
    ipAllowList: []
